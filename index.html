<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<!-- スマホ必須 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>輪投げ大会</title>
  <link rel="apple-touch-icon" href="icon.png"> <!-- iPhone用 -->
  <link rel="icon" type="image/png" sizes="192x192" href="icon.png"> <!-- Android用 -->
  <meta name="apple-mobile-web-app-title" content="輪投げ大会"> <!-- ホーム画面でのアプリ名 -->
  <!-- UIを綺麗にするためのアイコンフォント（任意） -->
  <link rel="stylesheet" href="https://cloudflare.com">


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

h1 {
  text-align: center;
  margin: 14px 0 24px;
  font-size: 64px;   /* ★追加 */
}

/* ===== 全体 ===== */
body {
  font-size: 48px;   /* ★約1.7倍 */
  font-family: sans-serif;
  margin: 0;
  padding: 14px;
  background: #f2f2f2;
}

/* ===== ボタン ===== */
button {
  font-size: 64px;   /* ★倍近く */
  padding: 60px 60px;
  margin: 18px;
  border-radius: 20px;
  border: none;
  background: #1976d2;
  color: white;
  width: 95%;
}

/* 表（重要：崩れ防止） */
td, th {
  border: 1px solid #ccc;
  padding: 10px;
  font-size: 36px;   /* ★追加 */
  text-align: center;
}

.view {
  display: none;
}

/* ===== カード ===== */
.card {
  font-size: 46px;   /* ★見やすさ重視 */
  background: white;
  padding: 28px;
  margin: 18px 0;
  border-radius: 18px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.15);
  line-height: 1.6;
}

/* ===== 順位強調 ===== */
.rank {
  font-size: 56px;   /* ★主役 */
  font-weight: bold;
}

.rankNo {

  display: inline-block;

  width: 140px;

  white-space: nowrap;

  font-weight: bold;
}

.scoreLine {
  font-size: 50px;
  font-weight: bold;
  color: #1976d2;
  margin: 14px 0;
}

.buttonArea {
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ===== 1〜3位色分け ===== */
.gold { background: #fff3b0; }
.silver { background: #e0e0e0; }
.bronze { background: #f4d2a1; }

/* ===== グラフ ===== */
#chartView {
  height: 1000px;  
  overflow-y: auto;

}

.loading {

  font-size: 96px;

  font-weight: bold;

  text-align: center;

  padding: 100px 20px;

  color: #1976d2;

  background: white;

  border-radius: 20px;

  margin: 20px;

  box-shadow:
    0 2px 8px rgba(0,0,0,0.2);
}

.loading {

  animation:
    blink 1.2s infinite;
}

@keyframes blink {

  0% {
    opacity: 1;
  }

  50% {
    opacity: 0.4;
  }

  100% {
    opacity: 1;
  }
}
.clickable {

  color: #1976d2;

  text-decoration: underline;

  font-weight: bold;

  cursor: pointer;
}

.clickable:active {

  opacity: 0.6;
}

.scoreTable {

  width: 100%;

  border-collapse: collapse;

  background: white;

  margin-bottom: 30px;

  font-size: 28px;
}

.scoreTable th,
.scoreTable td {

  border: 1px solid #999;

  padding: 12px;

  text-align: center;
}

.scoreTable th {

  background: #1976d2;

  color: white;
}

</style>

</head>

<body>

<h1>

</h1>


<div class="buttonArea">

  <button onclick="showTeam()">
    団体成績
  </button>

  <button onclick="showPlayer()">
    個人成績
  </button>

  <button onclick="showChart()">
    グラフ
  </button>
  
  <button onclick="showScoreTable()">
  スコア一覧
  </button>

  <div id="scoreView" class="view"></div>

</div>

<div id="rankingArea">

<div id="teamView" class="view"></div>

<div id="playerView" class="view"></div>

<div id="chartView" class="view">

<canvas id="scoreChart" ></canvas>
  </div>

<div id="loading" class="loading">
読み込み中...
</div>

</div>

<script>
    // ⚠️ここにGASでデプロイした「ウェブアプリのURL (WEBAPP_URL)」を貼り付けてください
    const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbzpLlCxrP8OyWBICrLwADPf4i_GajoEYI7GM13ryn7wMxGkih_8MURxK5slDzNqMDacsQ/exec"; 
const eventId =
  new URLSearchParams(
    location.search
  ).get("event");

window.onerror = function(
  msg,
  src,
  line,
  col,
  err
){

  alert(
    "JS Error\n" +
    msg +
    "\nline:" + line
  );

};

const WEBAPP_URL = "<?= WEBAPP_URL ?>";

let chart = null;

let teamData = [];

let playerData = [];

let scoreLogData = [];

let maxRound = 5;

let playerCount = 5;

let scoreCount = 5;

let playerRankTopPercent = 50;

let tournamentName =
  "輪投げ大会";

let currentView = "team";

// =====================
// config
// =====================

async function loadConfig(){

  const response =
    await fetch(

      WEBAPP_URL
      + "?mode=config"

    );

  const data =
    await response.json();

  console.log(
    "config",
    data
  );

  maxRound =

    Number(
      data.maxRound || 5
    );

  playerCount =

    Number(
      data.playerCount || 5
    );
    
  scoreCount =

    Number(
      data.scoreCount || 5
    );
    
  playerRankTopPercent = 
  
    Number(
      data.playerRankTopPercent || 50
    );

  tournamentName =

    data.tournament
    || "輪投げ大会";

  // title反映
  document.querySelector(
    "h1"
  ).innerText =

    "🏆 "
    + tournamentName;

}

// =====================
// team
// =====================

async function loadTeam(){

  const response =
    await fetch(
      WEBAPP_URL + "?mode=team"
    );

  const data =
    await response.json();

  console.log(data);

  teamData =
    data.team || [];

}
// =====================
// player
// =====================

async function loadPlayer(){

  const response =
    await fetch(
      WEBAPP_URL + "?mode=player"
    );

  const data =
    await response.json();

  console.log(data);

  playerData =
    data.player || [];

}
// =====================
// scorelog
// =====================

async function loadScoreLog(){

  const response =
    await fetch(
      WEBAPP_URL + "?mode=scorelog"
    );

  const data =
    await response.json();

  console.log(data);

  scoreLogData =
    data.scorelog || [];

}
async function loadConfig(){

  const response =

    await fetch(
      WEBAPP_URL
      + "?mode=config"
    );

  const data =
    await response.json();

  maxRound =
    Number(
      data.maxRound || 5
    );
    
  playerRankTopPercent =
    Number(
      data.playerRankTopPercent || 50
    );
 

}

// =====================
// load all
// =====================

async function loadData() {

  try {

    showLoading(true);

    // config先
    await loadConfig();

    // 並列取得
    await Promise.all([

      loadTeam(),

      loadPlayer(),

      loadScoreLog()

    ]);

    console.log(teamData);
    console.log(playerData);
    console.log(scoreLogData);

    // 描画
    renderCurrentView();

  } catch(err){

    console.error(err);

    alert(
      "データ取得エラー"
    );

  } finally {

    showLoading(false);

  }

}

window.onload = async () => {

  showLoading(true);

  await loadData();

  showTeam();

  showLoading(false);

};

// 60秒ごと更新
setInterval(async () => {

  await loadData();

}, 60000);

function hideAll() {
  document.getElementById("teamView").style.display = "none";
  document.getElementById("playerView").style.display = "none";
  document.getElementById("chartView").style.display = "none";
  document.getElementById("scoreView").style.display = "none";
}

function showTeam(){

  currentView = "team";

  hideAll();

  document
    .getElementById("teamView")
    .style.display = "block";

  renderTeam(teamData);

}

function showPlayer(){

  currentView = "player";

  hideAll();

  document
    .getElementById("playerView")
    .style.display = "block";

  renderPlayer(playerData);

}

function showChart(){

  currentView = "chart";

  hideAll();

  document
    .getElementById("chartView")
    .style.display = "block";

  renderChart(teamData);

}

function showScoreTable(){

  currentView = "score";

  hideAll();

  document
    .getElementById("scoreView")
    .style.display = "block";

  renderScoreTable();

}

function renderTeam(data) {

  const el =
    document.getElementById("teamView");

  el.innerHTML = "";

  data.forEach((d, i) => {

    let cls = "";

    if (i === 0) cls = "gold";
    else if (i === 1) cls = "silver";
    else if (i === 2) cls = "bronze";

    // 回戦配列
    const rounds = [];
     for(
       let r=1;
        r<=maxRound;
         r++
          ){
             rounds.push(
               d[`第${r}回戦`] || 0 
               );
           }

    // 空白除去
    const scores =
      rounds
        .filter(v => v > 0)
        .join(" / ");

    el.innerHTML += `

      <div class="card ${cls}">

        <div class="rank clickable"
         onclick='showTeamDetail(${JSON.stringify(d.チーム)})'>

         ${d.順位}位　${d.チーム}
        </div>   

        <div class="scoreLine">
          ${scores}
        </div>

        <div>
          合計 ${d.合計}点
        </div>

      </div>
    `;
  });
}

function renderPlayer(data) {

  const el =
    document.getElementById("playerView");

  el.innerHTML = "";

  const displayCount =
  Math.max(
    1,
    Math.ceil(
      data.length
      * playerRankTopPercent
      / 100
    )
  );

data.slice(0, displayCount)
  .forEach((d, i) => {

    let cls = "";

    if (i === 0) cls = "gold";
    else if (i === 1) cls = "silver";
    else if (i === 2) cls = "bronze";

    // 回戦
   const rounds = [];

    for(
      let r=1;
      r<=maxRound;
      r++
    ){

      rounds.push(

        d[`第${r}回戦`] || 0

      );

    }

    // 空白除去
    const scores =
      rounds
        .filter(v => v > 0)
        .join(" / ");

    el.innerHTML += `

      <div class="card ${cls}">

        <div class="rank">
          ${d.順位}位　
          ${d.名前}
          ${d.チーム}
        </div>

        <div class="scoreLine">
          ${scores}
        </div>

        <div>
          合計 ${d.合計}点
        </div>

      </div>
    `;
  });
}

function showTeamDetail(teamName) {

  const el =
    document.getElementById("teamView");

  // 該当メンバー抽出
  const members =
   playerData.filter(p =>

    String(p.チーム).trim() ===
    String(teamName).trim()

  );

  let html = `
    <div class="card gold">

      <div class="rank">
        ${teamName}
      </div>

    </div>
  `;

  members.forEach(p => {

const scores = [];

for(
  let r=1;
  r<=maxRound;
  r++
){

  const v =

    p[`第${r}回戦`] || 0;

  if(v > 0){

    scores.push(v);

  }

}

const scoreText =
  scores.join(" / ");

    html += `

      <div class="card">

      <div class="rank">

        <span class="rankNo">

         ${Number(p.順位)
           <= Math.ceil(
                playerData.length
                * playerRankTopPercent
                / 100
              )
         ? `${p.順位}位`
         : ""}

         </span>

         ${p.名前}

        </div>
        <div class="scoreLine">
          ${scoreText}
        </div>

        <div>
          合計 ${p.合計}点
        </div>

      </div>
    `;
  });

  el.innerHTML = html;

   hideAll();

  document.getElementById("teamView").style.display = "block";

}

function renderChart(data) {

  const ctx = document.getElementById("scoreChart");

  if (chart) chart.destroy();

  const colors = [
    "#4e79a7",
    "#f28e2b",
    "#76b7b2",
    "#e15759",
    "#59a14f",
    "#edc948",
    "#b07aa1",
    "#ff9da7",
    "#9c755f",
    "#bab0ab"
  ];

  chart = new Chart(ctx, {

    type: 'bar',

    data: {

      labels: data.map(d => d.チーム),

      datasets: Array.from(
        { length: maxRound },
        (_, i) => ({
          label: `第${i + 1}回戦`,
          data: data.map(d => d[`第${i + 1}回戦`] || 0),
          backgroundColor: colors[i % colors.length]
        })
      )
    },

    options: {

  maintainAspectRatio: false,

  indexAxis: 'y',

  plugins: {

    legend: {

      labels: {

        font: {

          size: 42   // ← ヘッダー文字

        }

      }

    }

  },

  scales: {

    x: {

      stacked: true,

      ticks: {

        font: {

          size: 32   // ← 点数

        }

      }

    },

    y: {

      stacked: true,

      ticks: {

        font: {

          size: 42   // ← チーム名

        }

      }

    }

  }

}
  });
}

function renderScoreTable() {

  const el =
    document.getElementById(
      "scoreView"
    );

// =====================
// score header
// =====================

let scoreHeaders = "";

for(
  let s=1;
  s<=scoreCount;
  s++
){

  scoreHeaders +=
    `<th>S${s}</th>`;

}

// =====================
// table start
// =====================

let html = `

  <table class="scoreTable">

    <tr>

      <th>チーム</th>

      <th>回</th>

      ${scoreHeaders}

      <th>計</th>

    </tr>
`;

scoreLogData.forEach(r => {

  // =====================
  // score cols
  // =====================

  let scoreCols = "";

  for(
    let s=1;
    s<=scoreCount;
    s++
  ){

    scoreCols +=

      `<td>${r[`S${s}`] || 0}</td>`;

  }

  html += `

    <tr>

      <td>${r.チーム}</td>

      <td>${r.回戦}</td>

      ${scoreCols}

      <td>${r.合計}</td>

    </tr>
  `;

});

  html += `</table>`;

  el.innerHTML = html;
}

function renderCurrentView(){

  if(currentView === "team"){

    renderTeam(teamData);

  }

  else if(currentView === "player"){

    renderPlayer(playerData);

  }

  else if(currentView === "chart"){

    renderChart(teamData);

  }

  else if(currentView === "score"){

    renderScoreTable();

  }

}

function showLoading(flag){

  document
    .getElementById("loading")
    .style.display =
      flag
      ? "block"
      : "none";

}

function showError(msg){

  document.body.insertAdjacentHTML(

    "beforeend",

    `
    <div class="card bronze">
      ${msg}
    </div>
    `
  );

}

</script>

</body>
</html>
